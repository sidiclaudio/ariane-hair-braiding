<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 480 160"
  width="320" height="107"
  role="img" aria-label="Ariane Hair Braiding Logo">
  <defs>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="25%"  stop-color="#B8954A" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#D4AF6E"/>
      <stop offset="75%"  stop-color="#B8954A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Crown arc motif -->
  <g fill="none" stroke="#B8954A" opacity="0.6">
    <path d="M 178 57 Q 240 20 302 57" stroke-width="0.7" stroke-linecap="round"/>
    <path d="M 193 57 Q 240 29 287 57" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M 208 57 Q 240 38 272 57" stroke-width="1.1" stroke-linecap="round"/>
  </g>
  <!-- Crown apex diamond -->
  <polygon points="240,16 244,22 240,28 236,22"
           fill="#D4AF6E" opacity="0.95"/>

  <!-- ARIANE wordmark -->
  <text x="240" y="94"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="46" font-weight="300"
        fill="#F0EAE0"
        text-anchor="middle"
        letter-spacing="13">ARIANE</text>

  <!-- Ornamental divider -->
  <line x1="44" y1="108" x2="436" y2="108"
        stroke="url(#goldLine)" stroke-width="0.8"/>
  <polygon points="240,103 244,108 240,113 236,108"
           fill="#B8954A" opacity="0.9"/>
  <circle cx="220" cy="108" r="1.3" fill="#B8954A" opacity="0.45"/>
  <circle cx="260" cy="108" r="1.3" fill="#B8954A" opacity="0.45"/>

  <!-- HAIR BRAIDING subtext -->
  <text x="240" y="131"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="12" font-weight="300"
        fill="#C4A96C"
        text-anchor="middle"
        letter-spacing="7">HAIR  BRAIDING</text>

  <!-- Subtle border frame -->
  <rect x="28" y="12" width="424" height="136"
        fill="none" stroke="#B8954A" stroke-width="0.4" opacity="0.18"/>
</svg>