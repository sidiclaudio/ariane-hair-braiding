name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::513423756739:role/github-actions-ariane-deploy
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://ariane-hair-braiding \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "CLAUDE.md" \
            --exclude ".claude/*" \
            --exclude ".DS_Store"
